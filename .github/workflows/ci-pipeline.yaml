name: DevSecOps CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # STEP 1: Image banayenge par PUSH nahi karenge (Sirf local load)
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          push: false
          load: true 
          tags: aniketpuro/solar-system:${{ github.sha }}

      # STEP 2: Ab us image ko Trivy se scan karenge
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'aniketpuro/solar-system:${{ github.sha }}'
          format: 'table'
          exit-code: '1' # Critical bug aane par fail!
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # STEP 3: Agar Trivy pass ho gaya, tabhi DockerHub par push karenge
      - name: Push to DockerHub
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: aniketpuro/solar-system:latest, aniketpuro/solar-system:${{ github.sha }}